name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            lib-path: native/build/Release/janet_shim.dll
          - os: ubuntu-latest
            rid: linux-x64
            lib-path: native/build/libjanet_shim.so
          # TODO: macOS ARM64 crashes during test execution (native test host crash
          # in janet_init). Needs investigation — likely kqueue/event loop or
          # code signing issue on Apple Silicon CI runners.
          # - os: macos-15
          #   rid: osx-arm64
          #   lib-path: native/build/libjanet_shim.dylib

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build native shim
        working-directory: native
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Build .NET solution
        run: dotnet build --configuration Release

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: ${{ matrix.lib-path }}
          if-no-files-found: error

  pack:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble runtimes directory
        run: |
          mkdir -p runtimes/win-x64/native
          mkdir -p runtimes/linux-x64/native
          cp artifacts/native-win-x64/janet_shim.dll     runtimes/win-x64/native/
          cp artifacts/native-linux-x64/libjanet_shim.so runtimes/linux-x64/native/
          # TODO: re-enable when macOS ARM64 CI is fixed
          # mkdir -p runtimes/osx-arm64/native
          # cp artifacts/native-osx-arm64/libjanet_shim.dylib runtimes/osx-arm64/native/

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.1.0-ci.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack NuGet package
        run: >
          dotnet pack src/JanetSharp.Core/JanetSharp.Core.csproj
          --configuration Release
          /p:Version=${{ steps.version.outputs.version }}
          --output ./nupkg

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg

  publish:
    needs: pack
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
